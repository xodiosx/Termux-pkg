name: sync

on:
  schedule:
    # Automatically run sync once a day at midnight UTC
    - cron: '0 0 * * *'
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch all history for all tags and branches
          fetch-depth: 0 

      - name: Sync and merge upstream repository with your current repository
        uses: dabreadman/sync-upstream-repo@v1.3.0
        with:
          # The official Termux packages repository
          upstream_repo: "https://github.com/termux/termux-packages.git"
          # Termux uses 'master', not 'main'
          upstream_branch: "master"
          # Your fork's branch that you want to update
          downstream_branch: "master"
          # Built-in GitHub token for write permissions
          token: ${{ secrets.GITHUB_TOKEN }}
